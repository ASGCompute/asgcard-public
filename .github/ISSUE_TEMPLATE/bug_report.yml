name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible to help us reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Call endpoint ...
        2. With payload ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Payments
        - Issuer
        - Webhooks
        - Ledger
        - Infrastructure
        - SDK
        - Web
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (system down)
        - High (feature broken)
        - Medium (degraded experience)
        - Low (cosmetic)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant log output (redact any PAN/CVV/secrets).
      render: shell
