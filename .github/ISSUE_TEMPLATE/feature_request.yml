name: Feature Request
description: Request a new feature or enhancement
title: "[FEAT] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for ASG Card.
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see implemented?
      placeholder: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this feature to be considered complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Payments
        - Issuer
        - Webhooks
        - Ledger
        - Infrastructure
        - Observability
        - Pilot
        - SDK
        - Web
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (Critical)
        - P1 (High)
        - P2 (Normal)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context, mockups, or references.
