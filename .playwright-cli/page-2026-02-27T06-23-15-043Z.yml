              - list [ref=e97]:
                - listitem [ref=e98]: Take the raw request body (the JSON payload exactly as received).
                - listitem [ref=e99]: Use your Webhook Sign Token as the secret key.
                - listitem [ref=e100]: Compute the SHA256 hash of the body.
                - listitem [ref=e101]: Compare the computed value with the webhook-sign header.
                - listitem [ref=e102]: If they match, the request is valid.
