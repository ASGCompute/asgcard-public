app = "asg-x402-facilitator"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "4022"
  STELLAR_NETWORK = "stellar:pubnet"
  STELLAR_RPC_URL = "https://mainnet.sorobanrpc.com"

[http_service]
  internal_port = 4022
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
